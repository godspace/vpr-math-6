<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Тренажёр ВПР по математике 6 класс | Интерактивная подготовка</title>
    <meta name="description" content="Бесплатный интерактивный тренажёр для подготовки к ВПР по математике за 6 класс. 17 уникальных заданий с автоматической проверкой, подсказками и пошаговым решением.">
    
    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #F4F7F9;
            --success: #2ECC71;
            --error: #E74C3C;
            --accent: #FF9F1C;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 2rem;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            flex: 1; 
        }
        
        /* Шапка меню */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }
        .header-info h1 {
            margin: 0 0 0.5rem 0;
            color: #2c3e50;
            font-size: 1.8rem;
            width: 100%;
        }
        
        /* Панель ученика */
        .student-panel {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 0.5rem;
        }
        .student-greeting {
            font-size: 1.1rem;
            color: #7f8c8d;
            font-weight: bold;
        }
        
        /* Кнопка сброса */
        .reset-btn {
            margin-left: auto;
            background: transparent;
            color: #95a5a6;
            border: 1px solid #bdc3c7;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .reset-btn:hover {
            background-color: #fdeaea;
            color: var(--error);
            border-color: var(--error);
        }

        /* Прогресс-бар и Статистика */
        .progress-container {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }

        /* Блок статистики (Таймер, Баллы, Оценка) */
        .stats-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e1e8ed;
            margin-bottom: 1.5rem;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            display: block;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 0.3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
            font-family: monospace;
        }
        .grade-badge {
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            cursor: help;
        }
        .grade-2 { background-color: var(--error); }
        .grade-3 { background-color: var(--accent); }
        .grade-4 { background-color: var(--primary); }
        .grade-5 { background-color: var(--success); }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .progress-track {
            width: 100%;
            height: 12px;
            background-color: #ecf0f1;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--success);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Сетка заданий */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        .task-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }
        .task-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.15);
        }
        .task-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .task-status {
            font-size: 1rem;
            font-weight: bold;
            color: #95a5a6;
        }
        .task-card.completed {
            background-color: #f0fdf4;
            border-color: var(--success);
        }
        .task-card.completed .task-number { color: var(--success); }
        .task-card.completed .task-status { color: var(--success); }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-box h2 { margin-top: 0; color: var(--primary); }
        .modal-box p { color: #555; line-height: 1.4; }
        .modal-box input {
            width: 100%;
            padding: 1rem;
            margin: 1.5rem 0;
            font-size: 1.1rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
        }
        .modal-box input:focus { outline: none; border-color: var(--primary); }
        .modal-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .modal-btn:hover { background-color: #357ABD; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="modal-overlay hidden" id="login-modal">
    <div class="modal-box">
        <h2>Добро пожаловать!</h2>
        <p>Для старта тестирования и запуска таймера введи свою Фамилию и Имя.</p>
        <input type="text" id="student-name-input" placeholder="Например: Иванов Иван" autocomplete="off">
        <button class="modal-btn" onclick="saveStudent()">Начать подготовку</button>
    </div>
</div>

<div class="container">
    <header class="header">
        <div class="header-info">
            <h1>Тренажёр ВПР. Математика (6 класс)</h1>
            <div class="student-panel">
                <span class="student-greeting" id="greeting-display">Ученик: Неизвестно</span>
                <button class="reset-btn" onclick="resetProgress()" title="Удалить все сохранения и начать заново">Выйти / Сбросить</button>
            </div>
        </div>
    </header>

    <main>
        <section class="progress-container">
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-label">Время в пути:</span>
                    <span class="stat-value" id="timer-display">00:00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Баллы:</span>
                    <span class="stat-value" id="score-display">0 / 23</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Оценка:</span>
                    <span class="stat-value grade-badge grade-2" id="grade-display" title="Критерии ВПР:&#10;0-6 баллов: «2»&#10;7-13 баллов: «3»&#10;14-18 баллов: «4»&#10;19-23 баллов: «5»">2</span>
                </div>
            </div>

            <div class="progress-text">
                <span>Выполнено заданий:</span>
                <span id="progress-count">0 / 17</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
        </section>

        <nav class="tasks-grid" id="tasks-grid"></nav>
    </main>
</div>

<script>
    const TOTAL_TASKS = 17;
    let timerInterval;

    window.onload = () => {
        checkAuth();
        renderGrid();
        updateProgressAndStats();
        startTimer();
    };

    function checkAuth() {
        const studentName = localStorage.getItem('vpr_student');
        if (!studentName) {
            document.getElementById('login-modal').classList.remove('hidden');
            document.getElementById('student-name-input').focus();
        } else {
            document.getElementById('greeting-display').textContent = `Ученик: ${studentName}`;
        }
    }

    function saveStudent() {
        const input = document.getElementById('student-name-input').value.trim();
        if (input.length < 2) {
            alert("Пожалуйста, введи настоящие Фамилию и Имя.");
            return;
        }
        localStorage.setItem('vpr_student', input);
        
        // Фиксируем время начала, если его ещё нет
        if (!localStorage.getItem('vpr_start_time')) {
            localStorage.setItem('vpr_start_time', Date.now().toString());
        }
        
        document.getElementById('login-modal').classList.add('hidden');
        document.getElementById('greeting-display').textContent = `Ученик: ${input}`;
        startTimer();
    }

    function resetProgress() {
        if (confirm("Вы уверены, что хотите полностью сбросить свой прогресс, таймер и удалить имя?")) {
            localStorage.removeItem('vpr_progress');
            localStorage.removeItem('vpr_student');
            localStorage.removeItem('vpr_start_time');
            localStorage.removeItem('vpr_finish_time');
            location.reload();
        }
    }

    function renderGrid() {
        const grid = document.getElementById('tasks-grid');
        const progress = JSON.parse(localStorage.getItem('vpr_progress')) || {};
        grid.innerHTML = '';

        for (let i = 1; i <= TOTAL_TASKS; i++) {
            const isCompleted = progress[i] === true;
            
            let link = `tasks/task_${i}/index.html`;
            if (i === 14) link = `tasks/task_14/index.html`; // Специфика 14 задания (двойное)

            const a = document.createElement('a');
            a.href = link;
            a.className = `task-card ${isCompleted ? 'completed' : ''}`;
            
            let pointsLabel = i <= 11 ? '1 балл' : '2 балла';

            a.innerHTML = `
                <div class="task-number">Задание ${i}</div>
                <div style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 8px;">Макс: ${pointsLabel}</div>
                <div class="task-status">${isCompleted ? '✅ Выполнено' : 'Ожидает решения'}</div>
            `;
            grid.appendChild(a);
        }
    }

    function updateProgressAndStats() {
        const progress = JSON.parse(localStorage.getItem('vpr_progress')) || {};
        let completedCount = 0;
        let points = 0;
        
        for (let i = 1; i <= TOTAL_TASKS; i++) {
            if (progress[i]) {
                completedCount++;
                // Задания 1-11 дают по 1 баллу. Задания 12-17 дают по 2 балла.
                points += (i <= 11) ? 1 : 2;
            }
        }

        // Обновляем шкалу заданий
        const percentage = (completedCount / TOTAL_TASKS) * 100;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
        document.getElementById('progress-count').textContent = `${completedCount} / ${TOTAL_TASKS}`;

        // Обновляем баллы
        document.getElementById('score-display').textContent = `${points} / 23`;

        // Вычисляем и обновляем предварительную оценку
        let grade = 2;
        let gradeClass = 'grade-2';
        
        if (points >= 19) { grade = 5; gradeClass = 'grade-5'; }
        else if (points >= 14) { grade = 4; gradeClass = 'grade-4'; }
        else if (points >= 7) { grade = 3; gradeClass = 'grade-3'; }

        let gradeEl = document.getElementById('grade-display');
        gradeEl.textContent = grade;
        gradeEl.className = `stat-value grade-badge ${gradeClass}`;

        // Если выполнены все задания, фиксируем время финиша (если ещё не зафиксировано)
        if (completedCount === TOTAL_TASKS && !localStorage.getItem('vpr_finish_time')) {
            localStorage.setItem('vpr_finish_time', Date.now().toString());
            startTimer(); // Чтобы остановить визуальное тиканье
        }
    }

    function startTimer() {
        let startTime = localStorage.getItem('vpr_start_time');
        let finishTime = localStorage.getItem('vpr_finish_time');

        if (!startTime) return; // Таймер не запускается, пока не введут имя

        const updateClock = () => {
            let endTime = finishTime ? parseInt(finishTime) : Date.now();
            let diffSeconds = Math.floor((endTime - parseInt(startTime)) / 1000);
            
            let h = Math.floor(diffSeconds / 3600);
            let m = Math.floor((diffSeconds % 3600) / 60).toString().padStart(2, '0');
            let s = (diffSeconds % 60).toString().padStart(2, '0');
            
            let timeStr = h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
            document.getElementById('timer-display').textContent = timeStr;
            
            // Если есть время окончания (все задачи решены), останавливаем таймер
            if (finishTime && timerInterval) {
                clearInterval(timerInterval);
                document.getElementById('timer-display').style.color = 'var(--success)';
            }
        };

        // Запускаем немедленно, чтобы не было задержки в 1 секунду
        updateClock();
        
        // Запускаем интервал, если таймер должен тикать
        if (!finishTime) {
            clearInterval(timerInterval);
            timerInterval = setInterval(updateClock, 1000);
        }
    }

    document.getElementById('student-name-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') saveStudent();
    });
</script>

</body>
</html>
