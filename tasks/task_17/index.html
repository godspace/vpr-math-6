<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 17. Логика и числа</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #F4F7F9;
            --success: #2ECC71;
            --error: #E74C3C;
            --accent: #FF9F1C;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .trainer-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .header-bar h2 { margin: 0; color: #333; }
        .date-badge {
            background-color: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #777;
            font-family: monospace;
        }
        
        .task-container {
            background-color: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin-bottom: 2rem;
            font-size: 1.25rem;
            color: #2c3e50;
            line-height: 1.6;
        }

        /* Интерактивный черновик */
        .lab-container {
            background-color: #eaf2f8;
            border: 2px dashed #aeb6bf;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .lab-title {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lab-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .lab-input-row input {
            flex: 1;
            font-size: 1.2rem;
            padding: 0.8rem;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 6px;
        }
        .lab-input-row input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .lab-btn {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        .lab-btn:hover { background-color: #34495e; }
        
        /* Лог проверок */
        .log-list {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .log-item {
            background-color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            border-left: 3px solid #ccc;
            animation: slideDown 0.3s ease;
        }
        .log-item.bad { border-color: var(--error); }
        .log-item.good { border-color: var(--success); font-weight: bold; }

        /* Финальный ответ */
        .final-answer-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #eee;
        }
        .final-answer-row input {
            font-size: 1.5rem;
            padding: 0.8rem;
            width: 200px;
            text-align: center;
            border: 2px solid var(--primary);
            border-radius: 8px;
        }
        button.action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            width: 100%;
            max-width: 250px;
        }
        button.action-btn:hover { background-color: #357ABD; }
        
        .feedback {
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 1.5rem;
            margin-top: 1rem;
            text-align: center;
        }

        .success-screen {
            text-align: center;
            padding: 2rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .success-screen h3 { color: var(--success); font-size: 2rem; margin-bottom: 0.5rem; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<a href="../../index.html" style="position: absolute; top: 25px; left: 25px; text-decoration: none; background-color: #ecf0f1; color: #2c3e50; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; transition: 0.2s;" onmouseover="this.style.backgroundColor='#bdc3c7'" onmouseout="this.style.backgroundColor='#ecf0f1'">&#8592; В меню</a>

<div class="trainer-card" id="main-card">
    <div class="header-bar">
        <h2>Задание 17</h2>
    </div>
    
    <div class="task-container" id="task-text">
        </div>
    
    <div class="lab-container">
        <div class="lab-title">
            <span>Калькулятор-черновик</span>
            <span style="font-size: 0.9rem; font-weight: normal; color: #7f8c8d;">Проверяй свои гипотезы здесь</span>
        </div>
        <div class="lab-input-row">
            <input type="number" id="test-input" placeholder="Введи двузначное число..." autocomplete="off">
            <button class="lab-btn" onclick="testNumber()">Проверить</button>
        </div>
        <div class="log-list" id="log-list">
            </div>
    </div>
    
    <div class="final-answer-row">
        <div style="font-weight: bold; color: #2c3e50;">Итоговый ответ:</div>
        <input type="number" id="answer-input" placeholder="Число" autocomplete="off">
        <button class="action-btn" id="check-btn" onclick="checkFinalAnswer()">Готово!</button>
        <div class="feedback" id="feedback-display"></div>
    </div>
</div>

<div class="trainer-card success-screen" id="success-screen">
    <h3>Победа! 🏆</h3>
    <p>Вы успешно завершили все задания тренажёра ВПР.</p>
    <button class="action-btn" onclick="window.location.href='../../index.html'" style="margin-top: 2rem;">Вернуться в главное меню</button>
</div>

<script>
    let currentTask = {};

    // Варианты задач (k - во сколько раз десятков меньше, diff - на сколько увеличивается, ans - правильный ответ)
    const scenarios = [
        { k: 2, diff: 18, ans: 24 },
        { k: 2, diff: 27, ans: 36 }, // демоверсия
        { k: 2, diff: 36, ans: 48 },
        { k: 3, diff: 36, ans: 26 },
        { k: 3, diff: 54, ans: 39 },
        { k: 4, diff: 27, ans: 14 },
        { k: 4, diff: 54, ans: 28 }
    ];

    function generateTask() {
        currentTask = scenarios[Math.floor(Math.random() * scenarios.length)];
        
        document.getElementById('task-text').innerHTML = 
            `В задуманном двузначном числе цифра, стоящая в разряде десятков, в <b>${currentTask.k} раза меньше</b> цифры, стоящей в разряде единиц.<br><br>` +
            `Если эти две цифры поменять местами, то число <b>увеличится на ${currentTask.diff}</b>.<br><br>` +
            `Найдите задуманное число.`;
            
        document.getElementById('test-input').focus();
    }

    function testNumber() {
        let inputStr = document.getElementById('test-input').value.trim();
        if (!inputStr || inputStr.length !== 2) return; // Проверка на двузначность
        
        let num = parseInt(inputStr, 10);
        let tens = Math.floor(num / 10);
        let units = num % 10;
        
        let reversedNum = units * 10 + tens;
        let diff = reversedNum - num;
        
        let logList = document.getElementById('log-list');
        let logItem = document.createElement('div');
        logItem.className = 'log-item';
        
        // Проверяем условия задачи для визуального фидбека в логе
        let isKCorrect = (units === tens * currentTask.k);
        let isDiffCorrect = (diff === currentTask.diff);
        
        if (isKCorrect && isDiffCorrect) {
            logItem.classList.add('good');
            logItem.innerHTML = `<span>Попытка: <b>${num}</b> &rarr; <b>${reversedNum}</b></span> <span>Разница: +${diff} ✅ Идеально!</span>`;
            // Автоматически подставляем в ответ, если ребёнок нашёл число в черновике
            document.getElementById('answer-input').value = num;
        } else {
            logItem.classList.add('bad');
            let kStatus = isKCorrect ? '' : `(десятки не в ${currentTask.k} р. меньше) `;
            logItem.innerHTML = `<span>Попытка: <b>${num}</b> &rarr; <b>${reversedNum}</b></span> <span style="font-size: 0.9em; color: #7f8c8d;">Разница: ${diff > 0 ? '+'+diff : diff} ❌ ${kStatus}</span>`;
        }
        
        logList.insertBefore(logItem, logList.firstChild);
        document.getElementById('test-input').value = '';
        document.getElementById('test-input').focus();
    }

    // Запуск черновика по нажатию Enter
    document.getElementById('test-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') testNumber();
    });

    function checkFinalAnswer() {
        let inputStr = document.getElementById('answer-input').value.trim();
        let feedback = document.getElementById('feedback-display');
        
        if (inputStr === '') {
            feedback.textContent = 'Введите итоговый ответ!';
            feedback.style.color = '#e67e22';
            return;
        }

        let userAnswer = parseInt(inputStr, 10);

        if (userAnswer === currentTask.ans) {
            feedback.textContent = '';
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';

            let progress = JSON.parse(localStorage.getItem('vpr_progress')) || {};
            progress[17] = true; // Финальное задание выполнено!
            localStorage.setItem('vpr_progress', JSON.stringify(progress));
            
        } else {
            feedback.textContent = 'Ответ неверный. Воспользуйтесь калькулятором-черновиком выше, чтобы проверить это число!';
            feedback.style.color = 'var(--error)';
        }
    }

    window.onload = generateTask;
</script>

</body>
</html>
