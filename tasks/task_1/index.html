<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 1. Целые числа</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #F4F7F9;
            --success: #2ECC71;
            --error: #E74C3C;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .trainer-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .expression {
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 1.5rem 0;
            color: #333;
        }
        input[type="number"] {
            font-size: 1.5rem;
            padding: 0.5rem;
            width: 150px;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 0.5rem;
        }
        button:hover { background-color: #357ABD; }
        .feedback {
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5rem;
            margin-top: 1rem;
        }
        .btn-next {
            background-color: #7f8c8d;
            display: none;
        }
        .btn-next:hover { background-color: #636e72; }
    </style>
</head>
<body>

<div class="trainer-card">
    <a href="../../index.html" style="position: absolute; top: 25px; left: 25px; text-decoration: none; background-color: #ecf0f1; color: #2c3e50; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; transition: 0.2s;" onmouseover="this.style.backgroundColor='#bdc3c7'" onmouseout="this.style.backgroundColor='#ecf0f1'">&#8592; В меню</a>
    <h2>Задание 1</h2>
    <p>Вычислите значение выражения:</p>
    <div class="expression" id="expression-display"></div>
    
    <input type="number" id="answer-input" placeholder="Ответ" autocomplete="off">
    <button id="check-btn" onclick="checkAnswer()">Проверить</button>
    <button id="next-btn" class="btn-next" onclick="generateTask()">Следующий пример</button>
    
    <div class="feedback" id="feedback-display"></div>
</div>

<script>
    let currentAnswer = 0;

    // Генератор случайных чисел в диапазоне [min, max]
    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    // Алгоритм генерации заданий
    function generateTask() {
        // Сброс интерфейса
        document.getElementById('answer-input').value = '';
        document.getElementById('feedback-display').textContent = '';
        document.getElementById('answer-input').disabled = false;
        document.getElementById('check-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('answer-input').focus();

        const type = rand(1, 3);
        let expressionStr = '';

        if (type === 1) {
            // Тип: -a * (b + c)
            let a = rand(-9, -2);
            let b = rand(10, 80);
            let c = rand(10, 80);
            expressionStr = `${a} &middot; (${b} + ${c})`;
            currentAnswer = a * (b + c);
        } else if (type === 2) {
            // Тип: a * (b - c)
            let a = rand(2, 9);
            let b = rand(10, 50);
            let c = rand(51, 99); // Гарантируем отрицательное в скобках
            expressionStr = `${a} &middot; (${b} - ${c})`;
            currentAnswer = a * (b - c);
        } else {
            // Тип: a - b * c
            let a = rand(10, 50);
            let b = rand(2, 9);
            let c = rand(10, 30);
            expressionStr = `${a} - ${b} &middot; ${c}`;
            currentAnswer = a - b * c;
        }

        document.getElementById('expression-display').innerHTML = expressionStr;
    }

    // Валидатор ответа
    function checkAnswer() {
        const inputStr = document.getElementById('answer-input').value;
        const feedback = document.getElementById('feedback-display');
        
        if (inputStr === '') {
            feedback.textContent = 'Введите ответ!';
            feedback.style.color = '#e67e22';
            return;
        }

        const userAnswer = parseInt(inputStr, 10);

        if (userAnswer === currentAnswer) {
            feedback.textContent = 'Верно! Возвращаемся в меню...';
            feedback.style.color = 'var(--success)';
            document.getElementById('answer-input').disabled = true;
            document.getElementById('check-btn').style.display = 'none';

            // 1. Сохраняем прогресс в localStorage браузера
            // Читаем старые данные (если есть) или создаем пустой объект
            let progress = JSON.parse(localStorage.getItem('vpr_progress')) || {};
            progress[1] = true; // Отмечаем Задание 1 (id: 1) как выполненное
            localStorage.setItem('vpr_progress', JSON.stringify(progress));

            // 2. Делаем редирект на главную страницу через 1.5 секунды
            setTimeout(() => {
                // Путь зависит от вашей структуры папок. 
                // Если index.html лежит в корне, а тренажер в tasks/task_1/:
                window.location.href = '../../index.html'; 
            }, 1500);

        } else {
            feedback.textContent = 'Ошибка. Попробуй еще раз!';
            feedback.style.color = 'var(--error)';
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }
    }

    // Слушатель для клавиши Enter
    document.getElementById('answer-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            if (document.getElementById('check-btn').style.display !== 'none') {
                checkAnswer();
            } else {
                generateTask();
            }
        }
    });

    // Инициализация первого задания при загрузке
    window.onload = generateTask;
</script>

</body>
</html>
