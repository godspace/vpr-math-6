<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 13. Вычисления с дробями</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #F4F7F9;
            --success: #2ECC71;
            --error: #E74C3C;
            --accent: #FF9F1C;
            --chip-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            /* Блокировка выделения текста */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        .trainer-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 750px;
            width: 100%;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .header-bar h2 { margin: 0; color: #333; }
        
        .task-container {
            background-color: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .task-instruction {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 1rem;
            text-align: left;
        }
        .main-expression {
            font-size: 1.8rem;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Красивое отображение дробей в тексте */
        .frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 4px;
            font-size: 0.85em;
        }
        .frac span.num { border-bottom: 2px solid #2c3e50; padding: 0 4px; line-height: 1.2; }
        .frac span.den { padding: 0 4px; line-height: 1.2; }
        .mixed { display: inline-flex; align-items: center; }
        .mixed .int { margin-right: 2px; font-weight: bold; }

        /* Конструктор */
        .completed-step {
            background-color: #eafaf1;
            border: 1px solid #a3e4d7;
            padding: 0.6rem 1rem; /* Сделали компактнее */
            border-radius: 6px;
            margin-bottom: 0.5rem;
            color: #1e8449;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            animation: fadeIn 0.4s ease;
        }

        .active-step {
            background-color: #fff;
            border: 2px solid var(--primary);
            padding: 1.2rem;
            border-radius: 8px;
            margin-top: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.1);
        }
        .step-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 1rem;
        }
        
        .slots-container {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        .slot {
            min-width: 60px;
            height: 50px;
            border: 2px dashed #95a5a6;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            background-color: #fafafa;
            cursor: pointer;
            transition: 0.2s;
            padding: 0 10px;
        }
        .slot.filled {
            border-style: solid;
            border-color: var(--primary);
            background-color: #e3f2fd;
        }
        .slot:hover.filled { background-color: #fdeaea; border-color: var(--error); }
        .equal-sign { font-size: 1.5rem; font-weight: bold; color: #555; margin: 0 5px; }
        
        /* Блок ввода дробей */
        .fraction-input-block {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .int-input {
            width: 45px;
            height: 45px;
            font-size: 1.3rem;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 6px;
        }
        .frac-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .frac-col input {
            width: 45px;
            height: 30px;
            font-size: 1.1rem;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 4px;
        }
        .frac-col input:focus, .int-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed #ccc;
        }
        .chip {
            padding: 6px 14px;
            background-color: var(--chip-bg);
            border: 2px solid #bdc3c7;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .chip:hover { border-color: var(--primary); background-color: #f0f8ff; transform: translateY(-2px); }
        .chip.hidden { display: none; }

        button.action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        button.action-btn:hover { background-color: #357ABD; }
        
        .feedback { font-size: 1.05rem; font-weight: bold; margin-top: 1rem; min-height: 24px; line-height: 1.4; }
        .success-screen { text-align: center; padding: 2rem; animation: fadeIn 0.5s ease; }
        .success-screen h3 { color: var(--success); font-size: 2rem; margin-bottom: 0.5rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="trainer-card">
    <div class="header-bar">
        <a href="../../index.html" style="position: absolute; top: 25px; left: 25px; text-decoration: none; background-color: #ecf0f1; color: #2c3e50; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; transition: 0.2s;" onmouseover="this.style.backgroundColor='#bdc3c7'" onmouseout="this.style.backgroundColor='#ecf0f1'">&#8592; В меню</a>
        <h2>Задание 13</h2>
    </div>
    
    <div class="task-container" id="task-display-container">
        <div class="task-instruction">Найдите значение выражения (соблюдая порядок действий):</div>
        <div class="main-expression" id="task-expression">
            </div>
    </div>
    
    <div id="builder-area"></div>
</div>

<script>
    let currentStepIndex = 0;
    
    function parseToHTML(str) {
        if (!str.includes('/')) {
            let isNegative = str.startsWith('-');
            if (isNegative) return `<span class="int">&minus;${str.substring(1)}</span>`;
            return `<span class="int">${str}</span>`;
        } 
        
        let parts = str.split(' ');
        if (parts.length === 2) {
            let isNegative = parts[0].startsWith('-');
            let intPart = isNegative ? parts[0].substring(1) : parts[0];
            let signHTML = isNegative ? `<span class="int">&minus;</span>` : '';
            let fracParts = parts[1].split('/');
            
            return `<div class="mixed">${signHTML}<span class="int">${intPart}</span><div class="frac"><span class="num">${fracParts[0]}</span><span class="den">${fracParts[1]}</span></div></div>`;
        } else {
            let fracParts = str.split('/');
            let isNegative = fracParts[0].startsWith('-');
            let numPart = isNegative ? fracParts[0].substring(1) : fracParts[0];
            let signHTML = isNegative ? `<span class="int">&minus;</span>` : '';
            
            return `<div class="mixed">${signHTML}<div class="frac"><span class="num">${numPart}</span><span class="den">${fracParts[1]}</span></div></div>`;
        }
    }

    // База сложных заданий с подробными поддействиями
    const taskScenarios = [
        {
            // Выражение: 2 3/4 : (3/4 - 5/3) + 4 * 1 1/4 = 2
            htmlExpression: `${parseToHTML("2 3/4")} : ( ${parseToHTML("3/4")} &minus; ${parseToHTML("5/3")} ) + 4 &middot; ${parseToHTML("1 1/4")}`,
            steps: [
                {
                    text: "1) Вычитание в скобках. Сначала приведём дроби к общему знаменателю (12):",
                    combos: [ ["9/12", "-", "20/12"] ],
                    expectedVal: -11/12, 
                    chips: ["9/12", "20/12", "-", "+", "3/12", "5/12"]
                },
                {
                    text: "2) Деление. Сначала переведём делимое в неправильную дробь:",
                    combos: [ ["2 3/4"] ],
                    expectedVal: 11/4, 
                    requireImproper: true,
                    chips: ["2 3/4", "11/4", "5/4", "3/4"]
                },
                {
                    text: "3) Теперь выполним само деление:",
                    combos: [ ["11/4", ":", "-11/12"] ],
                    expectedVal: -3, 
                    chips: ["11/4", "-11/12", ":", "·", "+", "33/48"]
                },
                {
                    text: "4) Умножение. Сначала переведём множитель в неправильную дробь:",
                    combos: [ ["1 1/4"] ],
                    expectedVal: 5/4, 
                    requireImproper: true,
                    chips: ["1 1/4", "5/4", "6/4", "1/4"]
                },
                {
                    text: "5) Выполним умножение:",
                    combos: [ ["4", "·", "5/4"], ["5/4", "·", "4"] ],
                    expectedVal: 5, 
                    chips: ["4", "5/4", "·", ":", "-", "20"]
                },
                {
                    text: "6) Финальное сложение полученных результатов:",
                    combos: [ ["-3", "+", "5"], ["5", "+", "-3"] ],
                    expectedVal: 2, 
                    chips: ["-3", "5", "+", "-", "-2", "8"]
                }
            ]
        },
        {
            // Выражение: 3 1/3 : (1/2 - 4/3) + 3 * 2 1/3 = 3
            htmlExpression: `${parseToHTML("3 1/3")} : ( ${parseToHTML("1/2")} &minus; ${parseToHTML("4/3")} ) + 3 &middot; ${parseToHTML("2 1/3")}`,
            steps: [
                {
                    text: "1) Вычитание в скобках. Приведём дроби к общему знаменателю (6):",
                    combos: [ ["3/6", "-", "8/6"] ],
                    expectedVal: -5/6, 
                    chips: ["3/6", "8/6", "-", "+", "4/6", "1/6"]
                },
                {
                    text: "2) Деление. Сначала переведём делимое в неправильную дробь:",
                    combos: [ ["3 1/3"] ],
                    expectedVal: 10/3, 
                    requireImproper: true,
                    chips: ["3 1/3", "10/3", "4/3", "1/3"]
                },
                {
                    text: "3) Выполним деление:",
                    combos: [ ["10/3", ":", "-5/6"] ],
                    expectedVal: -4, 
                    chips: ["10/3", "-5/6", ":", "·", "5/18", "+"]
                },
                {
                    text: "4) Умножение. Сначала переведём множитель в неправильную дробь:",
                    combos: [ ["2 1/3"] ],
                    expectedVal: 7/3, 
                    requireImproper: true,
                    chips: ["2 1/3", "7/3", "5/3", "1/3"]
                },
                {
                    text: "5) Выполним умножение:",
                    combos: [ ["3", "·", "7/3"], ["7/3", "·", "3"] ],
                    expectedVal: 7, 
                    chips: ["3", "7/3", "·", ":", "-", "21"]
                },
                {
                    text: "6) Финальное сложение результатов:",
                    combos: [ ["-4", "+", "7"], ["7", "+", "-4"] ],
                    expectedVal: 3, 
                    chips: ["-4", "7", "+", "-", "11", "3"]
                }
            ]
        }
    ];

    let currentTask = null;

    function initTask() {
        currentTask = taskScenarios[Math.floor(Math.random() * taskScenarios.length)];
        document.getElementById('task-expression').innerHTML = currentTask.htmlExpression;
        currentStepIndex = 0;
        renderBuilder();
    }

    function renderBuilder() {
        const area = document.getElementById('builder-area');
        
        if (currentStepIndex >= currentTask.steps.length) {
            document.getElementById('task-display-container').style.display = 'none';
            area.innerHTML = `
                <div class="success-screen">
                    <h3>Превосходно! 🥇</h3>
                    <p style="font-size: 1.2rem; color: #555;">Вы пошагово решили большое выражение без единой ошибки.</p>
                </div>
            `;
            let progress = JSON.parse(localStorage.getItem('vpr_progress')) || {};
            progress[13] = true;
            localStorage.setItem('vpr_progress', JSON.stringify(progress));
            setTimeout(() => { window.location.href = '../../index.html'; }, 3000);
            return;
        }

        const step = currentTask.steps[currentStepIndex];
        let html = '';

        for (let i = 0; i < currentStepIndex; i++) {
            let s = currentTask.steps[i];
            let comboHTML = s.combos[0].map(c => parseToHTML(c)).join(' ');
            html += `<div class="completed-step">✅ <span style="color:#555; font-size: 0.95em;">${s.text}</span> <b style="display:flex; align-items:center; gap:5px; margin-left: auto;">${comboHTML} = ${s.userResultHTML}</b></div>`;
        }

        html += `
            <div class="active-step">
                <div class="step-title">${step.text}</div>
                <div class="slots-container">
        `;
        
        for (let i = 0; i < step.combos[0].length; i++) {
            html += `<div class="slot" onclick="clearSlot(this)"></div>`;
        }
        
        html += `
                    <div class="equal-sign">=</div>
                    <div class="fraction-input-block">
                        <input type="text" id="inp-int" class="int-input" placeholder="Цел." autocomplete="off">
                        <div class="frac-col">
                            <input type="text" id="inp-num" placeholder="Числ." autocomplete="off">
                            <input type="text" id="inp-den" placeholder="Знам." autocomplete="off">
                        </div>
                    </div>
                </div>
                
                <div class="chips-container" id="chips-container">
        `;

        let shuffledChips = [...step.chips].sort(() => Math.random() - 0.5);
        shuffledChips.forEach((chipText, index) => {
            html += `<div class="chip" id="chip-${index}" onclick="useChip('${chipText}', 'chip-${index}')">${parseToHTML(chipText)}</div>`;
        });

        html += `
                </div>
                <button class="action-btn" onclick="checkStep()">Проверить действие</button>
                <div id="step-feedback" class="feedback"></div>
            </div>
        `;

        area.innerHTML = html;
        
        setTimeout(() => {
            document.getElementById('inp-int').focus();
        }, 100);
    }

    function useChip(text, id) {
        let slots = document.querySelectorAll('.slot');
        for (let slot of slots) {
            if (!slot.dataset.val) {
                slot.innerHTML = parseToHTML(text);
                slot.dataset.val = text; 
                slot.dataset.chipId = id;
                slot.classList.add('filled');
                document.getElementById(id).classList.add('hidden');
                break;
            }
        }
    }

    function clearSlot(slot) {
        if (!slot.dataset.val) return;
        let id = slot.dataset.chipId;
        document.getElementById(id).classList.remove('hidden');
        
        slot.innerHTML = '';
        delete slot.dataset.val;
        delete slot.dataset.chipId;
        slot.classList.remove('filled');
    }

    function checkStep() {
        let slots = document.querySelectorAll('.slot');
        let userArr = Array.from(slots).map(s => s.dataset.val || '');
        
        let rawInt = document.getElementById('inp-int').value.trim();
        let rawNum = document.getElementById('inp-num').value.trim();
        let rawDen = document.getElementById('inp-den').value.trim();
        
        let feedback = document.getElementById('step-feedback');

        if (userArr.includes('')) {
            feedback.textContent = "Заполните все ячейки выражения из кассы!";
            feedback.style.color = '#e67e22';
            return;
        }

        if (rawInt === '' && rawNum === '' && rawDen === '') {
            feedback.textContent = "Впишите ответ!";
            feedback.style.color = '#e67e22';
            return;
        }

        if ((rawNum !== '' && rawDen === '') || (rawNum === '' && rawDen !== '')) {
            feedback.textContent = "Дробь записана не полностью (проверьте числитель и знаменатель)!";
            feedback.style.color = '#e67e22';
            return;
        }

        if ((rawInt !== '' && rawInt !== '-' && isNaN(parseInt(rawInt))) || 
            (rawNum !== '' && rawNum !== '-' && isNaN(parseInt(rawNum))) || 
            (rawDen !== '' && isNaN(parseInt(rawDen)))) {
            feedback.textContent = "Пожалуйста, вводите только числа!";
            feedback.style.color = 'var(--error)';
            return;
        }

        let isNegative = false;
        if (rawInt.startsWith('-') || rawNum.startsWith('-')) {
            isNegative = true;
        }
        
        let absInt = rawInt === '' || rawInt === '-' ? 0 : Math.abs(parseInt(rawInt));
        let absNum = rawNum === '' || rawNum === '-' ? 0 : Math.abs(parseInt(rawNum));
        let absDen = rawDen === '' ? 1 : Math.abs(parseInt(rawDen));

        let step = currentTask.steps[currentStepIndex];

        if (step.requireImproper && absInt !== 0) {
            feedback.textContent = "Запишите ответ в виде неправильной дроби (без целой части)!";
            feedback.style.color = '#e67e22';
            return;
        }

        let userFloat = absInt + (absNum / absDen);
        if (isNegative) {
            userFloat = -userFloat;
        }

        let isComboCorrect = step.combos.some(combo => JSON.stringify(combo) === JSON.stringify(userArr));
        let isAnswerCorrect = Math.abs(userFloat - step.expectedVal) < 0.0001;

        if (!isComboCorrect) {
            feedback.textContent = "Выражение составлено неверно. Проверьте порядок или знаки!";
            feedback.style.color = 'var(--error)';
        } else if (!isAnswerCorrect) {
            feedback.textContent = "Выражение верное, но ответ посчитан с ошибкой (не забывайте про знаки минус). Попробуйте еще раз!";
            feedback.style.color = 'var(--error)';
        } else {
            let userResStr = "";
            if (absInt > 0) {
                userResStr += absInt;
                if (absNum > 0) {
                    userResStr += ` ${absNum}/${absDen}`;
                }
            } else {
                if (absNum > 0) {
                    userResStr += `${absNum}/${absDen}`;
                } else {
                    userResStr = "0";
                }
            }
            if (isNegative && userResStr !== "0") {
                userResStr = "-" + userResStr;
            }

            step.userResultHTML = parseToHTML(userResStr);
            currentStepIndex++;
            renderBuilder();
        }
    }

    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkStep();
        }
    });

    window.onload = initTask;
</script>

</body>
</html>
