<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 14. Окружность и круг</title>
    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #F4F7F9;
            --success: #2ECC71;
            --error: #E74C3C;
            --accent: #FF9F1C;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .trainer-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .header-bar h2 { margin: 0; color: #333; }
        .date-badge {
            background-color: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #777;
            font-family: monospace;
        }
        
        .task-container {
            background-color: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            color: #2c3e50;
            line-height: 1.6;
        }
        
        /* Визуализация клумбы */
        .visual-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .circle-drawing {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px dashed #7f8c8d; /* "заборчик" */
            background-color: #eafaf1; /* "газон" */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .circle-center {
            width: 6px;
            height: 6px;
            background-color: #2c3e50;
            border-radius: 50%;
            position: absolute;
        }
        .circle-radius {
            position: absolute;
            height: 2px;
            background-color: #2c3e50;
            width: 50%;
            right: 0;
            top: calc(50% - 1px);
            transform-origin: left center;
        }
        .radius-label {
            position: absolute;
            top: -20px;
            right: 25%;
            font-weight: bold;
            font-style: italic;
            font-family: serif;
        }

        /* Пошаговое решение */
        .step-block {
            border: 2px solid #eee;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            transition: 0.3s;
        }
        .step-block.active {
            border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.1);
            background-color: #fff;
        }
        .step-block.completed {
            border-color: var(--success);
            background-color: #f0fdf4;
        }
        .step-block.hidden {
            display: none;
        }
        .step-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #333;
        }
        .formula-hint {
            display: inline-block;
            background-color: #fff3cd;
            color: #856404;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            font-family: monospace;
        }
        
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="text"] {
            font-size: 1.3rem;
            padding: 0.5rem;
            width: 120px;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 6px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        input:disabled {
            background-color: #f5f5f5;
            color: #555;
            border-color: #ddd;
        }
        .unit {
            font-weight: bold;
            color: #555;
        }

        button.action-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        button.action-btn:hover { background-color: #357ABD; }
        
        .feedback {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 1rem;
            min-height: 20px;
        }
        .success-screen {
            text-align: center;
            padding: 1rem;
            animation: fadeIn 0.5s ease;
            display: none;
        }
        .success-screen h3 { color: var(--success); margin-bottom: 0.5rem; font-size: 1.5rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <a href="../../index.html" style="position: absolute; top: 25px; left: 25px; text-decoration: none; background-color: #ecf0f1; color: #2c3e50; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; transition: 0.2s;" onmouseover="this.style.backgroundColor='#bdc3c7'" onmouseout="this.style.backgroundColor='#ecf0f1'">&#8592; В меню</a>
<div class="trainer-card">
    <div class="header-bar">
        <h2>Задание 14</h2>
    </div>
    
    <div class="task-container" id="task-text">
        </div>
    
    <div class="visual-container">
        <div class="circle-drawing">
            <div class="circle-center"></div>
            <div class="circle-radius">
                <span class="radius-label">R</span>
            </div>
        </div>
    </div>
    
    <div class="step-block active" id="step1-block">
        <div class="step-title">Шаг 1: Найдите радиус клумбы (R)</div>
        <div class="formula-hint">Подсказка: C = 2 &middot; &pi; &middot; R</div>
        <div class="input-row">
            <input type="text" id="input-r" placeholder="R =" autocomplete="off">
            <span class="unit">м</span>
            <button class="action-btn" id="btn-step1" onclick="checkStep1()">Проверить</button>
        </div>
        <div class="feedback" id="feedback1"></div>
    </div>

    <div class="step-block hidden" id="step2-block">
        <div class="step-title">Шаг 2: Вычислите площадь клумбы (S)</div>
        <div class="formula-hint">Подсказка: S = &pi; &middot; R&sup2;</div>
        <div class="input-row">
            <input type="text" id="input-s" placeholder="S =" autocomplete="off">
            <span class="unit">м&sup2;</span>
            <button class="action-btn" id="btn-step2" onclick="checkStep2()">Проверить</button>
        </div>
        <div class="feedback" id="feedback2"></div>
    </div>
    
    <div class="success-screen" id="success-screen">
        <h3>Отлично! 🌸</h3>
        <p>Вы правильно применили формулы окружности и круга.</p>
    </div>
</div>

<script>
    const PI = 3.14;
    let currentR = 0;
    let currentC = 0;
    let currentS = 0;

    // Генерируем красивые целые радиусы (чтобы вычисления были посильными для 6 класса)
    const radii = [2, 3, 4, 5, 10];

    function generateTask() {
        // Выбираем случайный радиус
        currentR = radii[Math.floor(Math.random() * radii.length)];
        
        // Считаем длину заборчика (C) и площадь (S)
        currentC = Math.round((2 * PI * currentR) * 100) / 100;
        currentS = Math.round((PI * currentR * currentR) * 100) / 100;
        
        // Форматируем для русского языка (запятая вместо точки)
        let cStr = currentC.toString().replace('.', ',');
        
        document.getElementById('task-text').innerHTML = 
            `Клумба имеет форму круга. На границе клумбы установлен декоративный заборчик, длина которого равна <b>${cStr} м</b>.<br><br>` +
            `Найдите площадь клумбы. Ответ дайте в квадратных метрах. Число <i>&pi;</i> примите равным <b>3,14</b>.`;
    }

    function checkStep1() {
        let inputStr = document.getElementById('input-r').value.trim().replace(',', '.');
        let feedback = document.getElementById('feedback1');
        
        if (inputStr === '') {
            feedback.textContent = 'Введите значение радиуса!';
            feedback.style.color = '#e67e22';
            return;
        }

        let userR = parseFloat(inputStr);

        if (userR === currentR) {
            feedback.textContent = 'Верно! Теперь используй этот радиус для площади.';
            feedback.style.color = 'var(--success)';
            
            // Блокируем первый шаг
            document.getElementById('input-r').disabled = true;
            document.getElementById('btn-step1').style.display = 'none';
            document.getElementById('step1-block').classList.remove('active');
            document.getElementById('step1-block').classList.add('completed');
            
            // Открываем второй шаг
            document.getElementById('step2-block').classList.remove('hidden');
            document.getElementById('step2-block').classList.add('active');
            document.getElementById('input-s').focus();
            
        } else {
            feedback.textContent = `Ошибка. Разделите ${currentC.toString().replace('.', ',')} на (2 · 3,14).`;
            feedback.style.color = 'var(--error)';
            document.getElementById('input-r').value = '';
            document.getElementById('input-r').focus();
        }
    }

    function checkStep2() {
        let inputStr = document.getElementById('input-s').value.trim().replace(',', '.');
        let feedback = document.getElementById('feedback2');
        
        if (inputStr === '') {
            feedback.textContent = 'Введите значение площади!';
            feedback.style.color = '#e67e22';
            return;
        }

        let userS = parseFloat(inputStr);

        if (Math.abs(userS - currentS) < 0.01) { // Проверка с учетом погрешности JS
            feedback.textContent = 'Абсолютно верно!';
            feedback.style.color = 'var(--success)';
            
            // Завершаем задание
            document.getElementById('input-s').disabled = true;
            document.getElementById('btn-step2').style.display = 'none';
            document.getElementById('step2-block').classList.remove('active');
            document.getElementById('step2-block').classList.add('completed');
            
            let successScreen = document.getElementById('success-screen');
            successScreen.innerHTML = '<h3>Отлично! 🌸</h3><p>Первая часть решена. Загружаем вторую...</p>';
            successScreen.style.display = 'block';

            // Перенаправляем на вторую задачу вместо главного меню
            setTimeout(() => {
                window.location.href = '../task_14_2/index.html'; 
            }, 2000);
            
        } else {
            let rSquare = currentR * currentR;
            feedback.textContent = `Ошибка. Умножьте 3,14 на ${currentR}² (то есть на ${rSquare}).`;
            feedback.style.color = 'var(--error)';
            document.getElementById('input-s').value = '';
            document.getElementById('input-s').focus();
        }
    }

    // Слушатели для Enter
    document.getElementById('input-r').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkStep1();
    });
    document.getElementById('input-s').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkStep2();
    });

    window.onload = generateTask;
</script>

</body>
</html>
